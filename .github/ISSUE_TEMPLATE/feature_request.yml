name: Feature Request
description: Suggest a new feature
labels: ["feature", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What feature would you like?
      placeholder: Describe the feature clearly
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed?
      placeholder: What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work?
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Nice to have
        - Important
        - Critical
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Home
        - Physical AI
        - Community / Startup Cup
        - Academy
        - KITS
        - Studio
        - Admin
        - Auth
        - Contact
        - Other
    validations:
      required: true
